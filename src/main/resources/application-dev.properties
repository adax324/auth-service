# Application Configuration
spring.application.name=auth-service

# Server configuration
server.port=8081
server.servlet.context-path=/

# H2 Database configuration (Local Development)
spring.datasource.url=jdbc:h2:mem:drivingschool
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA/Hibernate configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 Console configuration
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT configuration
jwt.secret=mySecretKeyForJWTTokenGenerationAndValidationInDrivingSchoolAuthService
jwt.expirationMs=86400000

# Logging
logging.level.root=INFO
logging.level.com.drivingschool.auth=DEBUG

# Actuator endpoints
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.health.db.enabled=true

