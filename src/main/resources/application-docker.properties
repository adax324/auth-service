# Application Configuration
spring.application.name=auth-service

# Server configuration
server.port=8081
server.servlet.context-path=/

# PostgreSQL Database configuration (Docker)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/drivingschool_auth}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:authuser}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:authpass123}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# JWT configuration
jwt.secret=${JWT_SECRET:mySecretKeyForJWTTokenGenerationAndValidationInDrivingSchoolAuthService}
jwt.expirationMs=${JWT_EXPIRATION_MS:86400000}

# Logging
logging.level.root=INFO
logging.level.com.drivingschool.auth=INFO

# Actuator endpoints
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when-authorized
management.health.db.enabled=true

